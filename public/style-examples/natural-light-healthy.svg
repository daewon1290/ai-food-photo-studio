<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <linearGradient id="bg-nl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <radialGradient id="plate-shadow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#d1d5db" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d1d5db" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="window-light" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#fef9c3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fef9c3" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 배경 (밝은 흰 테이블) -->
  <rect width="320" height="180" fill="url(#bg-nl)"/>

  <!-- 창문 자연광 -->
  <rect x="0" y="0" width="180" height="180" fill="url(#window-light)"/>

  <!-- 테이블 선 (상단에서 살짝) -->
  <rect x="0" y="45" width="320" height="135" fill="#ffffff" fill-opacity="0.6"/>
  <line x1="0" y1="45" x2="320" y2="45" stroke="#e5e7eb" stroke-width="1"/>

  <!-- 그림자 -->
  <ellipse cx="160" cy="115" rx="70" ry="14" fill="url(#plate-shadow)"/>

  <!-- 흰 접시 -->
  <ellipse cx="160" cy="100" rx="65" ry="18" fill="#e5e7eb" fill-opacity="0.5"/>
  <circle cx="160" cy="95" r="62" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <circle cx="160" cy="95" r="50" fill="white" stroke="#f3f4f6" stroke-width="0.8"/>

  <!-- 샐러드 내용물 -->
  <!-- 녹색 잎 -->
  <ellipse cx="155" cy="90" rx="28" ry="18" fill="#4ade80" fill-opacity="0.7" transform="rotate(-15 155 90)"/>
  <ellipse cx="168" cy="88" rx="22" ry="14" fill="#86efac" fill-opacity="0.6" transform="rotate(10 168 88)"/>
  <ellipse cx="148" cy="98" rx="18" ry="12" fill="#34d399" fill-opacity="0.65" transform="rotate(-5 148 98)"/>
  <!-- 토마토 -->
  <circle cx="175" cy="100" r="8" fill="#f87171"/>
  <circle cx="175" cy="100" r="8" fill="none" stroke="#ef4444" stroke-width="0.5"/>
  <!-- 아보카도/노란 요소 -->
  <ellipse cx="148" cy="86" rx="7" ry="9" fill="#fde68a" stroke="#fbbf24" stroke-width="0.5"/>
  <!-- 허브 -->
  <circle cx="163" cy="80" r="4" fill="#6ee7b7"/>
  <circle cx="170" cy="83" r="3" fill="#34d399"/>

  <!-- 린넨 냅킨 (왼쪽) -->
  <rect x="60" y="110" width="35" height="45" rx="2" fill="#fef3c7" stroke="#fde68a" stroke-width="0.8" transform="rotate(-8 60 110)"/>
  <line x1="65" y1="118" x2="88" y2="112" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.5"/>
  <line x1="64" y1="124" x2="87" y2="118" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.5"/>

  <!-- 유리컵 (오른쪽) -->
  <path d="M242 72 L248 130 L258 130 L264 72 Z" fill="#dbeafe" fill-opacity="0.4" stroke="#bfdbfe" stroke-width="1"/>
  <ellipse cx="253" cy="72" rx="11" ry="4" fill="#eff6ff" fill-opacity="0.5" stroke="#bfdbfe" stroke-width="0.8"/>
  <!-- 물 -->
  <path d="M243 90 L247 130 L259 130 L263 90 Z" fill="#bfdbfe" fill-opacity="0.35"/>

  <!-- 작은 녹색 식물 (왼쪽 상단) -->
  <line x1="38" y1="140" x2="38" y2="95" stroke="#16a34a" stroke-width="1.5"/>
  <ellipse cx="28" cy="100" rx="12" ry="8" fill="#4ade80" fill-opacity="0.7" transform="rotate(-20 28 100)"/>
  <ellipse cx="48" cy="97" rx="11" ry="7" fill="#86efac" fill-opacity="0.65" transform="rotate(15 48 97)"/>
  <ellipse cx="35" cy="90" rx="9" ry="6" fill="#34d399" fill-opacity="0.6" transform="rotate(-5 35 90)"/>

  <!-- 상단 "임시" 뱃지 -->
  <rect x="8" y="8" width="30" height="14" rx="4" fill="#16a34a" fill-opacity="0.8"/>
  <text x="23" y="18.5" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="white">임시</text>

  <!-- 하단 레이블 바 -->
  <rect x="0" y="152" width="320" height="28" fill="#1f2937" fill-opacity="0.55"/>
  <text x="16" y="167" font-family="sans-serif" font-size="10" font-weight="bold" fill="#4ade80">자연광 건강식형</text>
  <text x="16" y="176" font-family="sans-serif" font-size="7.5" fill="#86efac" fill-opacity="0.8">밝은 자연광 · 흰 접시 · 식물 소품</text>
</svg>
