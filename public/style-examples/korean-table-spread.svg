  <circle cx="162" cy="80" r="3" fill="#e74c3c"/>
  <rect x="153" y="74" width="12" height="6" rx="2" fill="#fde68a" fill-opacity="0.6"/>

  <!-- 반찬 그릇들 — 왼쪽 위 -->
  <ellipse cx="84" cy="58" rx="22" ry="8" fill="#1a0f08" stroke="#6b3a1f" stroke-width="1"/>
  <path d="M62 52 Q62 58 84 58 Q106 58 106 52 L106 54 Q106 62 84 63 Q62 62 62 54 Z" fill="#251510"/>
