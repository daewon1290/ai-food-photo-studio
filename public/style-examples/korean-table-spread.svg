  <rect x="0" y="152" width="320" height="28" fill="#000000" fill-opacity="0.65"/>
  <text x="16" y="167" font-family="sans-serif" font-size="10" font-weight="bold" fill="#fbbf24">한상차림 풍성형</text>
  <text x="16" y="176" font-family="sans-serif" font-size="7.5" fill="#fcd34d" fill-opacity="0.7">메인 뚝배기 + 반찬 · 탑뷰 · 원목 테이블</text>
