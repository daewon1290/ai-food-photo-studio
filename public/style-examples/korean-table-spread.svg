  <line x1="0" y1="100" x2="320" y2="108" stroke="#78350f" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="0" y1="138" x2="320" y2="142" stroke="#92400e" stroke-width="0.8" stroke-opacity="0.25"/>

  <!-- 조명 -->
  <ellipse cx="160" cy="90" rx="130" ry="75" fill="url(#table-light)"/>

  <!-- 메인 그릇 (중앙 큰 뚝배기) -->
