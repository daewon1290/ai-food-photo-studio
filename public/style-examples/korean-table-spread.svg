  <ellipse cx="244" cy="125" rx="20" ry="7" fill="#1a0f08" stroke="#6b3a1f" stroke-width="1"/>
  <path d="M224 119 Q224 125 244 125 Q264 125 264 119 L264 121 Q264 129 244 130 Q224 129 224 121 Z" fill="#251510"/>
