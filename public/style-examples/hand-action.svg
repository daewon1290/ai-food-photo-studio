<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <radialGradient id="bg-ha" cx="40%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#292017"/>
      <stop offset="100%" stop-color="#111008"/>
    </radialGradient>
    <radialGradient id="food-light" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 (따뜻한 어두운 실내) -->
  <rect width="320" height="180" fill="url(#bg-ha)"/>

  <!-- 테이블면 -->
  <rect x="0" y="110" width="320" height="70" fill="#1a1208" fill-opacity="0.8"/>
  <line x1="0" y1="110" x2="320" y2="110" stroke="#3d2c10" stroke-width="1.2"/>

  <!-- 조명 글로우 -->
  <ellipse cx="160" cy="90" rx="110" ry="65" fill="url(#food-light)"/>

  <!-- 그릇/접시 -->
  <ellipse cx="165" cy="115" rx="72" ry="18" fill="#1a1208" fill-opacity="0.7"/>
  <circle cx="165" cy="108" r="68" fill="#241a0a" stroke="#4a3010" stroke-width="1.5"/>
  <circle cx="165" cy="108" r="55" fill="#2d1f0c"/>

  <!-- 음식 (전, 고기류) -->
  <ellipse cx="162" cy="106" rx="42" ry="30" fill="#6b3a0f"/>
  <!-- 구운 질감 -->
  <ellipse cx="155" cy="103" rx="35" ry="24" fill="#7c4415" fill-opacity="0.8"/>
  <ellipse cx="158" cy="101" rx="28" ry="18" fill="#8b5e1a" fill-opacity="0.7"/>
  <!-- 하이라이트 -->
  <ellipse cx="152" cy="97" rx="14" ry="8" fill="#d97706" fill-opacity="0.3"/>
  <ellipse cx="148" cy="95" rx="6" ry="4" fill="#f59e0b" fill-opacity="0.2"/>
  <!-- 소스 윤기 -->
  <path d="M145 105 Q160 100 178 107" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-opacity="0.35"/>

  <!-- 손 (젓가락 집는 동작) — 오른쪽 위에서 들어오는 구도 -->
  <!-- 손목/팔 -->
  <path d="M240 20 Q255 45 248 75 Q244 90 238 100" stroke="#c8956c" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M240 20 Q255 45 248 75 Q244 90 238 100" stroke="#e0ab82" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- 엄지 -->
  <path d="M242 88 Q250 82 252 72" stroke="#c8956c" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- 검지 -->
  <path d="M238 100 Q234 85 232 70" stroke="#c8956c" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M238 100 Q234 85 232 70" stroke="#e0ab82" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 젓가락 -->
  <line x1="230" y1="68" x2="155" y2="105" stroke="#c8a96e" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="234" y1="72" x2="162" y2="110" stroke="#b8955e" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 소스 드리즐 힌트 -->
  <path d="M80 55 Q85 68 82 80 Q79 92 85 103" stroke="#d97706" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-opacity="0.5"/>
  <!-- 소스병 -->
  <rect x="66" y="38" width="14" height="32" rx="4" fill="#4a1a08" stroke="#7c3a15" stroke-width="0.8"/>
  <rect x="68" y="34" width="10" height="8" rx="2" fill="#6b2a10"/>
  <ellipse cx="73" cy="49" rx="4" ry="6" fill="#c53030" fill-opacity="0.5"/>

  <!-- 동작감 라인 -->
  <line x1="258" y1="28" x2="270" y2="22" stroke="white" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="262" y1="38" x2="276" y2="34" stroke="white" stroke-width="0.8" stroke-opacity="0.12"/>

  <!-- 상단 "임시" 뱃지 -->
  <rect x="8" y="8" width="30" height="14" rx="4" fill="#d97706" fill-opacity="0.85"/>
  <text x="23" y="18.5" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="white">임시</text>

  <!-- 하단 레이블 바 -->
  <rect x="0" y="152" width="320" height="28" fill="#000000" fill-opacity="0.65"/>
  <text x="16" y="167" font-family="sans-serif" font-size="10" font-weight="bold" fill="#fbbf24">손동작 라이브형</text>
  <text x="16" y="176" font-family="sans-serif" font-size="7.5" fill="#fcd34d" fill-opacity="0.7">젓가락 집는 순간 · 따뜻한 실내 조명 · 생동감</text>
</svg>
