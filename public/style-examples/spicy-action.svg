<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <radialGradient id="bg-sa" cx="40%" cy="60%" r="80%">
      <stop offset="0%" stop-color="#1f0000"/>
      <stop offset="100%" stop-color="#090909"/>
    </radialGradient>
    <radialGradient id="sauce-glow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg-sa)"/>

  <!-- 붉은 소스 글로우 -->
  <ellipse cx="155" cy="105" rx="95" ry="55" fill="url(#sauce-glow)"/>

  <!-- 냄비/그릇 -->
  <ellipse cx="155" cy="115" rx="82" ry="20" fill="#1c0a0a" stroke="#7f1d1d" stroke-width="1.2"/>
  <path d="M73 100 Q73 115 155 115 Q237 115 237 100 L237 105 Q237 120 155 125 Q73 120 73 105 Z" fill="#3b0808"/>
  <path d="M73 100 Q73 88 155 88 Q237 88 237 100" fill="none" stroke="#7f1d1d" stroke-width="1.5"/>

  <!-- 소스 표면 -->
  <ellipse cx="155" cy="100" rx="80" ry="17" fill="#991b1b"/>
  <ellipse cx="155" cy="100" rx="75" ry="14" fill="#b91c1c"/>
  <!-- 윤기 하이라이트 -->
  <ellipse cx="140" cy="96" rx="30" ry="6" fill="#ef4444" fill-opacity="0.45"/>
  <ellipse cx="135" cy="95" rx="12" ry="3" fill="#fca5a5" fill-opacity="0.3"/>

  <!-- 떡 조각들 -->
  <rect x="130" y="94" width="18" height="9" rx="4" fill="#fde68a" stroke="#fbbf24" stroke-width="0.5"/>
  <rect x="155" y="92" width="16" height="9" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.5"/>
  <rect x="175" y="95" width="15" height="8" rx="4" fill="#fde68a" stroke="#fbbf24" stroke-width="0.5"/>

  <!-- 젓가락 (들어올리는 동작) -->
  <line x1="148" y1="40" x2="143" y2="100" stroke="#d4a574" stroke-width="3" stroke-linecap="round"/>
  <line x1="158" y1="38" x2="153" y2="97" stroke="#b8864e" stroke-width="3" stroke-linecap="round"/>
  <!-- 젓가락에 걸린 떡 -->
  <ellipse cx="148" cy="80" rx="10" ry="5" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.8" transform="rotate(-8 148 80)"/>

  <!-- 스팀/김 -->
  <path d="M130 88 Q127 80 130 72 Q133 64 130 56" stroke="#ef4444" stroke-width="1.2" fill="none" stroke-opacity="0.3" stroke-linecap="round"/>
  <path d="M155 85 Q151 75 154 65 Q157 55 154 46" stroke="#f87171" stroke-width="1" fill="none" stroke-opacity="0.25" stroke-linecap="round"/>
  <path d="M178 87 Q175 78 178 69 Q181 60 178 52" stroke="#ef4444" stroke-width="1" fill="none" stroke-opacity="0.2" stroke-linecap="round"/>

  <!-- 상단 "임시" 뱃지 -->
  <rect x="8" y="8" width="30" height="14" rx="4" fill="#ef4444" fill-opacity="0.85"/>
  <text x="23" y="18.5" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="white">임시</text>

  <!-- 하단 레이블 바 -->
  <rect x="0" y="152" width="320" height="28" fill="#000000" fill-opacity="0.7"/>
  <text x="16" y="167" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f87171">매운 음식 액션형</text>
  <text x="16" y="176" font-family="sans-serif" font-size="7.5" fill="#fca5a5" fill-opacity="0.7">젓가락 들어올리기 · 붉은 소스 윤기 · 스팀</text>
</svg>
