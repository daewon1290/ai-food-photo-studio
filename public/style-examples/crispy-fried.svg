<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180">
  <defs>
    <radialGradient id="bg-cf" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a1a00"/>
      <stop offset="100%" stop-color="#0d0800"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="320" height="180" fill="url(#bg-cf)"/>

  <!-- 링라이트 글로우 -->
  <ellipse cx="160" cy="95" rx="100" ry="65" fill="url(#glow)"/>

  <!-- 링라이트 원형 -->
  <circle cx="160" cy="95" r="72" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.25"/>
  <circle cx="160" cy="95" r="60" fill="none" stroke="#fbbf24" stroke-width="0.8" stroke-opacity="0.18"/>

  <!-- 치킨 조각들 (황금빛 원형) -->
  <ellipse cx="160" cy="90" rx="38" ry="30" fill="#b45309" stroke="#f59e0b" stroke-width="1.2"/>
  <ellipse cx="160" cy="90" rx="38" ry="30" fill="none" stroke="#fbbf24" stroke-width="0.6" stroke-opacity="0.6"/>
  <!-- 질감 줄 -->
  <path d="M138 82 Q160 78 182 82" stroke="#fbbf24" stroke-width="1" fill="none" stroke-opacity="0.5"/>
  <path d="M134 90 Q160 86 186 90" stroke="#fbbf24" stroke-width="0.8" fill="none" stroke-opacity="0.4"/>
  <path d="M138 98 Q160 95 182 98" stroke="#fbbf24" stroke-width="0.8" fill="none" stroke-opacity="0.3"/>

  <ellipse cx="105" cy="105" rx="22" ry="18" fill="#92400e" stroke="#f59e0b" stroke-width="1"/>
  <ellipse cx="215" cy="108" rx="20" ry="16" fill="#92400e" stroke="#d97706" stroke-width="1"/>
  <ellipse cx="118" cy="72" rx="16" ry="13" fill="#78350f" stroke="#d97706" stroke-width="0.8"/>
  <ellipse cx="203" cy="75" rx="15" ry="12" fill="#78350f" stroke="#b45309" stroke-width="0.8"/>

  <!-- 소스컵 힌트 -->
  <rect x="248" y="118" width="18" height="24" rx="3" fill="#dc2626" stroke="#ef4444" stroke-width="0.6"/>
  <rect x="248" y="118" width="18" height="6" rx="2" fill="#ef4444"/>

  <!-- 상단 "임시" 뱃지 -->
  <rect x="8" y="8" width="30" height="14" rx="4" fill="#f59e0b" fill-opacity="0.85"/>
  <text x="23" y="18.5" text-anchor="middle" font-family="sans-serif" font-size="7" font-weight="bold" fill="#1a1a1a">임시</text>

  <!-- 하단 레이블 바 -->
  <rect x="0" y="152" width="320" height="28" fill="#000000" fill-opacity="0.65"/>
  <text x="16" y="167" font-family="sans-serif" font-size="10" font-weight="bold" fill="#fbbf24">치킨 / 튀김 크리스피 강조형</text>
  <text x="16" y="176" font-family="sans-serif" font-size="7.5" fill="#f59e0b" fill-opacity="0.7">황금빛 튀김 질감 · 링라이트 · 다크 배경</text>
</svg>
